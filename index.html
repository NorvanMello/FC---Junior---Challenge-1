<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Character counter</title>
</head>
<body>
  <main class="main-card">
    <section class="container">
      <header>
        <picture>
          <img src="./assets/images/logo-dark-theme.svg" alt="" class="logo-img">
        </picture>

        <button type="button" class="header-btn" aria-label="Toggle theme">
          <img src="./assets/images/icon-sun.svg" alt="" class="btn-img">
        </button>
      </header>

      <h1 class="title-main">Analyze your text in real-time.</h1>

      <section class="text-area">
        <label for="text-area-element" class="hidden">Message</label>
        <textarea name="message" id="text-area-element"></textarea>
        <p class="error-text"></p>

        <section class="option-sec">
          <label>
            <input type="checkbox" id="exclude-spaces"> 
            Exclude Spaces
          </label>

          <label>
            <input type="checkbox" id="character-limit">
            Set Character Limit 
            <span class="character-limit-display"></span>
          </label>   

          <p class="reading-time-text">Approx. reading time: 1 minute</p> 
        </section>
      </section> 

      <section class="stats" aria-labelledby="stats-title">
        <h2 id="stats-title" class="sr-only">Writing statistics</h2>

        <ul class="stats-list">
          <li class="stat-card total-chars">
            <h3 class="text-show-results">Total Characters</h3>
            <img src="./assets/images/pattern-character-count.svg" alt="" class="bg-img-show-results-divs">
            <p class="number-show-results characters">00</p>
          </li>

          <li class="stat-card word-count">
            <h3 class="text-show-results">Word Count</h3>
            <img src="./assets/images/pattern-word-count.svg" alt="" class="bg-img-show-results-divs">
            <p class="number-show-results words">00</p>
          </li>

          <li class="stat-card sentence-count">
            <h3 class="text-show-results">Sentence Count</h3>
            <img src="./assets/images/pattern-sentence-count.svg" alt="" class="bg-img-show-results-divs">
            <p class="number-show-results sentences">00</p>
          </li>
        </ul>
      </section>

      
        <div class="letter-density">
          <h2 class="letter-title">Letter Density</h2>

          <div class="letter-list" >
              <ul class="" aria-live="polite" aria-atomic="true">

              </ul>
          </div>
        </div>

        <div class="extra-content">
          <ul class="" aria-live="polite" aria-atomic="true">

          </ul>
        </div>

        <button type="button" class="toggle-btn"  aria-label="Toggle menu">
          <span class="hidden">Toggle menu</span>
        </button>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
