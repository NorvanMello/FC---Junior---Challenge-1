<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Character counter</title>
</head>
<body>

  <main class="main-card">
    <section class="container">
      <header>
        <picture>
          <img src="./assets/images/logo-dark-theme.svg" alt="" class="logo-img">
        </picture>

        <button class="header-btn">
          <img src="./assets/images/icon-sun.svg" alt="" class="btn-img">
        </button>
      </header>

      <h1>Analyze your text in real-time.</h1>

      <section class="text-area">
        <textarea name="" id="text-area-element"></textarea>
        <p class="error-text"></p>

        <section class="option-sec">
          <p><input type="checkbox" id="exclude-spaces"> Exclude Spaces</p>

          <p><input type="checkbox" id="character-limit"> Set Character Limit <span class="character-limit-text"></span></p>   

          <p class="reading-time-text">Approx. reading time: 1 minute</p> 
        </section>
      </section> 

      <section class="show-results">
        <div class="total-chars show-result-divs">
          <img src="./assets/images/pattern-character-count.svg" alt="" class="bg-img-show-results-divs">

          <span class="number-show-results characters">00</span>
          <span class="text-show-results">Total Characters</span>
        </div>

        <div class="word-count show-result-divs">
          <img src="./assets/images/pattern-word-count.svg" alt="" class="bg-img-show-results-divs">

          <span class="number-show-results words">00</span>
          <span class="text-show-results">Word Count</span>
        </div>

        <div class="sentence-count show-result-divs">
          <img src="./assets/images/pattern-sentence-count.svg" alt="" class="bg-img-show-results-divs">

          <span class="number-show-results sentences">00</span>
          <span class="text-show-results">Sentence Count</span>
        </div>

        <div class="letter-density">
          <h2 class="letter-title">Letter Density</h2>

          <div class="letter-list">

          </div>
        </div>

        <div class="extra-content">

        </div>

        <button class="toggle-btn">

        </button>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
