<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Character counter</title>
</head>
<body>

  <main class="main-card">
    <section class="container">
      <header>
        <picture>
          <img src="./assets/images/logo-dark-theme.svg" alt="" class="logo-img">
        </picture>

        <button class="header-btn">
          <img src="./assets/images/icon-sun.svg" alt="" class="btn-img">
        </button>
      </header>

      <h1>Analyze your text in real-time.</h1>

      <section class="text-area">
        <textarea name="" id=""></textarea>
      </section>

      <section class="show-results">
        <div class="total-chars">

        </div>

        <div class="word-count">

        </div>

        <div class="senten-count">

        </div>

        <div class="letter-density">

        </div>
      </section>
    </section>
  </main>

  <!-- 

  Start typing here… (or paste your text)

  Exclude Spaces
  Set Character Limit

  Approx. reading time: Insert number minutes

      Insert number
  Total Characters

      Insert number
  Word Count

      Insert number
  Sentence Count

  Letter Density

  <script src="script.js"></script>
</body>
</html>
